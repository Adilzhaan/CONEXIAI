<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CONEXIAI — Сообщить о ситуации</title>
</head>
<body style="margin:0;background:#0b1220;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;">

  <div style="width:100%;max-width:440px;padding:16px;">
    <div style="background:#111827;border-radius:14px;border:1px solid #1f2d45;overflow:hidden;box-shadow:0 10px 40px rgba(0,0,0,0.5);">

      <div style="padding:20px 24px;background:#0f1f35;border-bottom:1px solid #1f2d45;">
        <div style="font-size:12px;color:#4f8fff;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;">CONEXIAI</div>
        <div style="font-size:17px;font-weight:700;margin-top:4px;">Сообщить о ситуации</div>
        <div style="font-size:12px;color:#4a5568;margin-top:3px;" id="meta"></div>
      </div>

      <div style="padding:22px 24px;" id="form-wrap">
        <p style="margin:0 0 14px;color:#9ca3af;font-size:13px;line-height:1.5;">
          Опишите ситуацию, проблему или риск внутри компании. Ваше сообщение будет передано аналитику.
        </p>

        <textarea id="message" placeholder="Например: конфликт в отделе продаж, задержка поставки, негативные отзывы клиентов..." style="width:100%;box-sizing:border-box;height:120px;padding:12px;border-radius:8px;border:1px solid #1f2d45;background:#0f1a2e;color:#fff;font-size:14px;line-height:1.5;resize:vertical;outline:none;font-family:inherit;"></textarea>

        <button onclick="send()" style="margin-top:12px;width:100%;padding:12px;background:#4f8fff;border:none;border-radius:8px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;">
          Отправить →
        </button>

        <div id="status" style="display:none;margin-top:12px;padding:12px;background:rgba(74,222,128,0.08);border:1px solid rgba(74,222,128,0.3);border-radius:8px;font-size:13px;color:#4ade80;text-align:center;">
          ✅ Сообщение отправлено. Спасибо!
        </div>
        <div id="error" style="display:none;margin-top:12px;padding:12px;background:rgba(248,113,113,0.08);border:1px solid rgba(248,113,113,0.3);border-radius:8px;font-size:13px;color:#f87171;text-align:center;">
          ❌ Ошибка отправки. Попробуйте ещё раз.
        </div>
      </div>

    </div>
  </div>

  <script>
    const p = new URLSearchParams(window.location.search);
    const userId   = p.get("user_id")  || "";
    const company  = p.get("company")  || "";
    const employee = p.get("employee") || "";

    if (company || employee) {
      document.getElementById("meta").textContent =
        [company, employee].filter(Boolean).join(" · ");
    }

    async function send() {
      const text = document.getElementById("message").value.trim();
      if (!text) return;

      try {
        const res = await fetch("https://n8n.maxinum.kz/webhook/8d9ad099-6214-463c-8c63-45e574d64052", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            user_id:   userId,
            company:   company,
            employee:  employee,
            message:   text,
            created_at: new Date().toISOString()
          })
        });
        if (!res.ok) throw new Error();
        document.getElementById("form-wrap").querySelector("textarea").style.display = "none";
        document.getElementById("form-wrap").querySelector("button").style.display = "none";
        document.getElementById("status").style.display = "block";
        document.getElementById("error").style.display = "none";
      } catch {
        document.getElementById("error").style.display = "block";
      }
    }
  </script>

</body>
</html>
